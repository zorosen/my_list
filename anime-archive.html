<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Anime Archive</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#e63946"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
/* ─── RESET & TOKENS ─────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:       #080b12;
  --s1:       #0d1120;
  --s2:       #111827;
  --s3:       #161d2e;
  --card:     #111827;
  --bd:       #1c2438;
  --bd2:      #253044;
  --acc:      #e63946;
  --acc2:     #ff5c67;
  --gold:     #f4c542;
  --teal:     #00d9a3;
  --purple:   #8b7cf8;
  --blue:     #3b82f6;
  --ink:      #e8ecf5;
  --sub:      #7a859e;
  --dim:      #3a4358;
  --head:     'Manrope',sans-serif;
  --mono:     'Space Mono',monospace;
}

/* === MODAL & UPLOAD UPDATES === */
.file-upload-wrapper {
  display: flex;
  align-items: center;
  gap: 12px;
  background-color: var(--color-surface-soft, rgba(255, 255, 255, 0.03));
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 6px;
  padding: 8px;
  margin-bottom: var(--spacing-modal-row, 16px);
}
.file-upload-btn {
  background-color: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: #fff;
  padding: 8px 16px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: background 0.2s, color 0.2s;
}
.file-upload-btn:hover {
  background-color: rgba(255, 255, 255, 0.15);
  color: var(--color-accent-soft, #fca5a5);
}
.file-upload-btn svg { width: 14px; height: 14px; }
.file-name {
  color: rgba(255, 255, 255, 0.5);
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex-grow: 1;
}
.modal-row .rating-group,
.modal-row .rating-group + div {
  width: 100%; /* Split the width equally */
}
.rating-group .rating-stars {
  display: flex;
  justify-content: flex-start;
  padding-left: 0;
  margin-top: 4px;
  gap: 4px;
}
.rating-group .star {
  font-size: 18px;
  color: var(--dim);
  cursor: pointer;
  transition: color 0.2s;
}
.rating-group .star.on {
  color: var(--gold);
}

html{font-size:14px;height:100%;}
body{background:var(--bg);color:var(--ink);font-family:var(--mono);min-height:100dvh;overflow-x:hidden;}
button{cursor:pointer;border:none;background:none;font-family:inherit;}
input,select,textarea{font-family:inherit;outline:none;}
img{display:block;}
a{text-decoration:none;color:inherit;}

/* ─── SCROLLBAR ─────────────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px;}

/* ─── TYPOGRAPHY ─────────────────────────────────────── */
.h1{font-family:var(--head);font-size:2rem;font-weight:900;line-height:1.1;}
.h2{font-family:var(--head);font-size:1.4rem;font-weight:900;line-height:1.2;}
.h3{font-family:var(--head);font-size:1rem;font-weight:800;line-height:1.3;}
.label{font-size:9px;letter-spacing:2.5px;color:var(--dim);text-transform:uppercase;}

/* ─── LAYOUT ─────────────────────────────────────────── */
.app{display:grid;grid-template-columns:220px 1fr;grid-template-rows:56px 1fr;height:100dvh;}
.topbar{grid-column:1/-1;grid-row:1;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(8,11,18,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100;}
.sidebar{grid-column:1;grid-row:2;background:var(--s1);border-right:1px solid var(--bd);overflow-y:auto;padding:20px 0;}
.main{grid-column:2;grid-row:2;overflow-y:auto;padding:24px;}

/* ─── TOPBAR ─────────────────────────────────────────── */
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:30px;height:30px;background:var(--acc);border-radius:6px;display:grid;place-items:center;font-family:var(--head);font-weight:900;font-size:16px;color:#fff;flex-shrink:0;box-shadow:0 0 16px rgba(230,57,70,.4);}
.brand-name{font-family:var(--head);font-size:14px;font-weight:900;letter-spacing:3px;color:#fff;text-transform:uppercase;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.search-wrap{position:relative;}
.search-wrap input{background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--ink);padding:7px 12px 7px 34px;font-size:12px;width:220px;transition:border-color .2s;}
.search-wrap input:focus{border-color:var(--acc);}
.search-wrap input::placeholder{color:var(--dim);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:15px;pointer-events:none;}
.btn-new{display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--acc);color:#fff;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:1px;transition:background .15s;box-shadow:0 0 14px rgba(230,57,70,.3);}
.btn-new:hover{background:var(--acc2);}
.btn-new svg{width:14px;height:14px;}

/* ─── SIDEBAR ─────────────────────────────────────────── */
.sb-section{padding:0 16px 20px;}
.sb-section+.sb-section{border-top:1px solid var(--bd);padding-top:20px;}
.sb-label{font-size:9px;letter-spacing:2.5px;color:var(--dim);margin-bottom:10px;}
.sb-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 10px;border-radius:7px;font-size:11px;color:var(--sub);transition:all .15s;gap:6px;text-align:left;}
.sb-btn:hover{background:var(--s2);color:var(--ink);}
.sb-btn.on{background:var(--s2);color:var(--ink);}
.sb-btn.on .sb-dot{box-shadow:0 0 6px currentColor;}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sb-cnt{font-size:10px;color:var(--dim);margin-left:auto;}
.sb-btn.on .sb-cnt{color:var(--sub);}
.genre-grid{display:flex;flex-wrap:wrap;gap:5px;}
.gpill{padding:4px 9px;border-radius:4px;font-size:10px;background:var(--s2);color:var(--dim);border:1px solid var(--bd);cursor:pointer;transition:all .15s;}
.gpill:hover,.gpill.on{background:var(--bd2);color:var(--ink);border-color:var(--bd2);}

/* ─── SECTIONS ───────────────────────────────────────── */
.section{display:none;}
.section.active{display:block;}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.sec-head-title{font-family:var(--head);font-size:13px;font-weight:900;letter-spacing:2px;text-transform:uppercase;}
.view-all{font-size:10px;letter-spacing:1px;color:var(--acc);display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;padding:0;}
.view-all:hover{opacity:.75;}

/* ─── BENTO STATS ─────────────────────────────────────── */
.bento-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;margin-bottom:28px;}
.bento{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:20px;position:relative;overflow:hidden;min-height:110px;display:flex;flex-direction:column;justify-content:flex-end;}
.bento-big{border-left:3px solid var(--acc);}
.bento-icon{position:absolute;right:-10px;top:-10px;font-size:5rem;opacity:.04;color:var(--ink);font-family:var(--head);font-weight:900;pointer-events:none;user-select:none;}
.bento-val{font-family:var(--head);font-weight:900;line-height:1;}
.bento-big .bento-val{font-size:3rem;color:var(--ink);}
.bento .bento-val{font-size:1.8rem;}
.bento:nth-child(2) .bento-val{color:var(--acc);}
.bento:nth-child(3) .bento-val{color:var(--gold);}

/* ─── CURRENTLY WATCHING ─────────────────────────────── */
.cw-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:32px;}
.cw-card{background:var(--card);border:1px solid var(--bd);border-radius:12px;display:flex;height:172px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .2s;}
.cw-card:hover{border-color:var(--bd2);transform:translateY(-2px);}
.cw-img{width:120px;flex-shrink:0;position:relative;overflow:hidden;}
.cw-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.cw-card:hover .cw-img img{transform:scale(1.06);}
.cw-body{flex:1;padding:14px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;}
.cw-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:9px;letter-spacing:1px;background:var(--s2);width:fit-content;margin-bottom:6px;}
.cw-title{font-family:var(--head);font-size:13px;font-weight:800;line-height:1.25;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.cw-genre{font-size:10px;color:var(--sub);margin-top:3px;}
.prog-wrap{margin-top:auto;}
.prog-meta{display:flex;justify-content:space-between;font-size:9px;color:var(--dim);letter-spacing:.5px;margin-bottom:5px;}
.prog-track{height:3px;background:var(--bd2);border-radius:2px;}
.prog-fill{height:100%;background:var(--acc);border-radius:2px;box-shadow:0 0 8px rgba(230,57,70,.5);}
.cw-btn{margin-top:8px;width:100%;padding:7px;background:var(--acc);color:#fff;border-radius:6px;font-size:9px;font-weight:700;letter-spacing:1.5px;display:flex;align-items:center;justify-content:center;gap:5px;transition:background .15s;}
.cw-btn:hover{background:var(--acc2);}

/* ─── HORIZONTAL SCROLL (Top Rated) ─────────────────── */
.hscroll{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;}
.hscroll::-webkit-scrollbar{display:none;}
.poster-card{flex-shrink:0;width:130px;cursor:pointer;}
.poster-card .poster{aspect-ratio:2/3;background:var(--s2);border-radius:10px;overflow:hidden;position:relative;margin-bottom:8px;transition:transform .2s;}
.poster-card:hover .poster{transform:translateY(-3px);}
.poster img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.poster-card:hover .poster img{transform:scale(1.06);}
.poster .badge-top{position:absolute;top:6px;left:6px;background:var(--acc);border-radius:20px;font-size:8px;padding:2px 7px;color:#fff;letter-spacing:1px;z-index:2;}
.poster .status-dot{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%;z-index:2;}
.poster .img-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,11,18,.85) 0%,transparent 50%);z-index:1;}
.poster-title{font-family:var(--head);font-size:11px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px;}
.poster-genre{font-size:9px;color:var(--sub);letter-spacing:.5px;}

/* ─── COLLECTION ─────────────────────────────────────── */
.coll-toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
.coll-toolbar-left{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.sort-btn{padding:5px 12px;border-radius:6px;font-size:10px;color:var(--dim);border:1px solid var(--bd);background:none;cursor:pointer;letter-spacing:.5px;transition:all .15s;}
.sort-btn:hover{border-color:var(--bd2);color:var(--sub);}
.sort-btn.on{border-color:var(--acc);color:var(--acc);}
.view-toggle{display:flex;border:1px solid var(--bd);border-radius:7px;overflow:hidden;}
.vbtn{padding:5px 10px;font-size:13px;color:var(--dim);background:none;border:none;cursor:pointer;transition:all .15s;}
.vbtn.on{background:var(--s2);color:var(--ink);}
.count-badge{font-size:10px;color:var(--sub);background:var(--s2);padding:4px 10px;border-radius:5px;letter-spacing:.5px;}
.genre-bar{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px;}

/* grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
.grid-card{background:var(--card);border:1px solid var(--bd);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative;}
.grid-card:hover{border-color:var(--bd2);transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.5);}
.grid-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--acc);opacity:0;transition:opacity .2s;z-index:3;}
.grid-card:hover::after{opacity:1;}
.gc-poster{aspect-ratio:2/3;background:var(--s2);position:relative;overflow:hidden;}
.gc-poster img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.grid-card:hover .gc-poster img{transform:scale(1.06);}
.gc-poster .img-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,11,18,.9) 0%,transparent 55%);z-index:1;}
.gc-body{padding:9px 10px;}
.gc-title{font-family:var(--head);font-size:11px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px;}
.gc-meta{display:flex;justify-content:space-between;align-items:center;}
.gc-genre{font-size:9px;color:var(--sub);}
.gc-stars{font-size:10px;color:var(--gold);letter-spacing:.5px;}

/* list */
.list-header{display:grid;grid-template-columns:1fr 100px 110px 80px 55px 60px;gap:10px;padding:6px 14px;margin-bottom:4px;}
.list-header span{font-size:9px;letter-spacing:1.5px;color:var(--dim);}
.list-rows{display:flex;flex-direction:column;gap:4px;}
.list-row{background:var(--card);border:1px solid var(--bd);border-radius:8px;display:grid;grid-template-columns:1fr 100px 110px 80px 55px 60px;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:all .15s;}
.list-row:hover{background:var(--s2);border-color:var(--bd2);}
.lr-thumb{width:30px;height:42px;border-radius:4px;overflow:hidden;background:var(--s2);flex-shrink:0;position:relative;}
.lr-title-wrap{display:flex;align-items:center;gap:10px;overflow:hidden;}
.lr-title{font-family:var(--head);font-size:12px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lr-center{text-align:center;font-size:10px;color:var(--sub);}
.lr-status{display:flex;align-items:center;justify-content:center;gap:5px;}
.lr-sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.lr-stext{font-size:9px;}
.lr-stars{color:var(--gold);font-size:10px;text-align:center;}
.lr-eps{font-size:10px;color:var(--sub);text-align:center;}
.lr-actions{display:flex;gap:3px;justify-content:flex-end;}
.act-btn{width:26px;height:26px;border-radius:5px;display:grid;place-items:center;font-size:12px;color:var(--dim);transition:all .15s;background:none;border:1px solid transparent;}
.act-btn:hover{border-color:var(--bd2);color:var(--sub);}
.act-btn.del:hover{border-color:var(--acc);color:var(--acc);}

/* ─── PLACEHOLDER (while image loads) ────────────────── */
.img-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--s2);}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{width:18px;height:18px;border:2px solid var(--bd2);border-top-color:var(--acc);border-radius:50%;animation:spin .75s linear infinite;}

/* ─── DRAWER ─────────────────────────────────────────── */
.drawer-bd{position:fixed;inset:0;z-index:140;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);display:none;}
.drawer-bd.open{display:block;}
.drawer{position:fixed;top:0;right:-440px;width:420px;height:100dvh;background:var(--s1);border-left:1px solid var(--bd2);z-index:150;display:flex;flex-direction:column;transition:right .35s cubic-bezier(.22,.68,0,1.2);}
.drawer.open{right:0;}
.drawer-hero{position:relative;flex-shrink:0;}
.drawer-hero-img{height:230px;overflow:hidden;position:relative;}
.drawer-hero-img img{width:100%;height:100%;object-fit:cover;}
.drawer-hero-img .hero-grad{position:absolute;inset:0;background:linear-gradient(to top,var(--s1) 0%,rgba(13,17,32,.4) 60%,transparent 100%);}
.drawer-close{position:absolute;top:12px;right:12px;z-index:5;width:30px;height:30px;border-radius:6px;background:rgba(8,11,18,.7);color:var(--sub);font-size:18px;display:grid;place-items:center;border:1px solid var(--bd);transition:all .15s;}
.drawer-close:hover{color:var(--ink);border-color:var(--bd2);}
.drawer-info{padding:0 20px 16px;position:relative;z-index:2;margin-top:-50px;}
.drawer-title{font-family:var(--head);font-size:20px;font-weight:900;line-height:1.2;margin-bottom:4px;}
.drawer-genre{font-size:9px;letter-spacing:2px;color:var(--dim);margin-bottom:8px;}
.drawer-stars{font-size:20px;color:var(--gold);letter-spacing:2px;}
.drawer-body{flex:1;overflow-y:auto;padding:16px 20px;}
.drow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd);}
.drow:last-child{border-bottom:none;}
.dkey{font-size:9px;letter-spacing:2px;color:var(--dim);}
.dval{font-size:12px;font-weight:700;}
.drawer-notes-wrap{margin-top:14px;}
.drawer-notes{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:12px;font-size:12px;color:var(--sub);line-height:1.7;min-height:60px;}
.drawer-actions{padding:16px 20px;border-top:1px solid var(--bd);display:grid;grid-template-columns:1fr 1fr;gap:8px;flex-shrink:0;}
.btn-edit{padding:10px;border-radius:7px;background:var(--purple);color:#fff;font-size:11px;font-weight:700;letter-spacing:1px;transition:filter .15s;}
.btn-edit:hover{filter:brightness(1.2);}
.btn-remove{padding:10px;border-radius:7px;background:transparent;color:var(--acc);border:1px solid var(--acc);font-size:11px;font-weight:700;letter-spacing:1px;transition:all .15s;}
.btn-remove:hover{background:var(--acc);color:#fff;}

/* ─── MODAL ──────────────────────────────────────────── */
.modal-bd{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bd.open{display:flex;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.modal{background:var(--s1);border:1px solid var(--bd2);border-radius:14px;width:100%;max-width:460px;overflow:hidden;animation:fadeUp .25s ease;}
.modal-head{background:var(--acc);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.modal-head h2{font-family:var(--head);font-size:13px;font-weight:900;letter-spacing:2px;color:#fff;}
.modal-close{color:rgba(255,255,255,.65);font-size:20px;line-height:1;padding:2px 8px;border-radius:4px;transition:background .15s;background:none;}
.modal-close:hover{background:rgba(255,255,255,.15);color:#fff;}
.modal-body{padding:20px;display:grid;gap:14px;max-height:65dvh;overflow-y:auto;}
.field label{display:block;font-size:9px;letter-spacing:2px;color:var(--dim);margin-bottom:6px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.finput{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--ink);padding:9px 12px;font-size:12px;font-family:var(--mono);transition:border-color .2s;}
.finput:focus{border-color:var(--acc);}
.finput::placeholder{color:var(--dim);}
select.finput option{background:var(--s2);}
.star-row{display:flex;gap:4px;}
.star{font-size:24px;color:var(--bd2);cursor:pointer;transition:all .15s;line-height:1;background:none;border:none;}
.star.on{color:var(--gold);}
.star:hover{transform:scale(1.2);}
.modal-foot{padding:14px 20px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px;}
.btn-cancel{padding:8px 16px;border-radius:7px;font-size:11px;color:var(--sub);border:1px solid var(--bd);background:transparent;transition:all .15s;}
.btn-cancel:hover{background:var(--s2);}
.btn-save{padding:8px 22px;border-radius:7px;font-size:11px;font-weight:700;color:#fff;background:var(--acc);transition:background .15s;}
.btn-save:hover{background:var(--acc2);}

/* ─── TOAST ──────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--s2);border:1px solid var(--bd2);border-left:3px solid var(--teal);border-radius:8px;padding:11px 16px;font-size:11px;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;max-width:260px;line-height:1.5;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.err{border-left-color:var(--acc);}

/* ─── EMPTY STATE ─────────────────────────────────────── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--dim);}
.empty-icon{font-size:44px;opacity:.3;}
.empty-text{font-size:11px;letter-spacing:2px;}

/* ─── RESPONSIVE ─────────────────────────────────────── */
@media(max-width:900px){
  .app{grid-template-columns:1fr;grid-template-rows:56px 1fr;}
  .topbar{grid-column:1;}
  .sidebar{display:none;position:fixed;top:56px;left:0;width:260px;height:calc(100dvh - 56px);z-index:80;}
  .sidebar.mobile-open{display:flex;flex-direction:column;}
  .main{grid-column:1;grid-row:2;}
  .cw-grid{grid-template-columns:1fr;}
  .bento-grid{grid-template-columns:1fr 1fr;}
  .bento-big{grid-column:1/-1;}
  .list-header,.list-row{grid-template-columns:1fr 85px 90px 60px;}
  .lr-eps-col,.lr-actions-col{display:none;}
  .search-wrap input{width:150px;}
  .drawer{width:100%;right:-100%;}
}
@media(max-width:600px){
  .main{padding:16px;}
  .bento-grid{grid-template-columns:1fr;}
  .cards-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));}
  .poster-card{width:110px;}
}
</style>
</head>
<body>
<div class="app">

<!-- ═══════════════ TOP BAR ═══════════════ -->
<header class="topbar">
  <div class="brand">
    <button id="menuBtn" onclick="toggleMobileSidebar()" style="color:var(--sub);display:none;margin-right:4px;" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="brand-mark">ア</div>
    <span class="brand-name">Anime Archive</span>
  </div>
  <div class="topbar-right">
    <div class="search-wrap">
      <span class="search-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </span>
      <input id="searchInput" type="text" placeholder="Search anime…" autocomplete="off" oninput="handleSearch(this.value)"/>
    </div>
    <button class="btn-new" onclick="openModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      NEW
    </button>
  </div>
</header>

<!-- ═══════════════ SIDEBAR ═══════════════ -->
<aside class="sidebar" id="sidebar">

  <div class="sb-section">
    <div class="sb-label">Status</div>
    <button class="sb-btn on" data-sb-status="All" onclick="clickStatus(this,'All')">
      <span>All Entries</span>
      <span class="sb-cnt" id="sc-All">0</span>
    </button>
    <button class="sb-btn" data-sb-status="Completed" onclick="clickStatus(this,'Completed')">
      <span style="display:flex;align-items:center;gap:7px;"><span class="sb-dot" style="background:var(--teal);"></span>Completed</span>
      <span class="sb-cnt" id="sc-Completed">0</span>
    </button>
    <button class="sb-btn" data-sb-status="Watching" onclick="clickStatus(this,'Watching')">
      <span style="display:flex;align-items:center;gap:7px;"><span class="sb-dot" style="background:var(--gold);"></span>Watching</span>
      <span class="sb-cnt" id="sc-Watching">0</span>
    </button>
    <button class="sb-btn" data-sb-status="On Hold" onclick="clickStatus(this,'On Hold')">
      <span style="display:flex;align-items:center;gap:7px;"><span class="sb-dot" style="background:#9a9ab8;"></span>On Hold</span>
      <span class="sb-cnt" id="sc-On Hold">0</span>
    </button>
    <button class="sb-btn" data-sb-status="Dropped" onclick="clickStatus(this,'Dropped')">
      <span style="display:flex;align-items:center;gap:7px;"><span class="sb-dot" style="background:var(--acc);"></span>Dropped</span>
      <span class="sb-cnt" id="sc-Dropped">0</span>
    </button>
    <button class="sb-btn" data-sb-status="Plan to Watch" onclick="clickStatus(this,'Plan to Watch')">
      <span style="display:flex;align-items:center;gap:7px;"><span class="sb-dot" style="background:var(--purple);"></span>Plan to Watch</span>
      <span class="sb-cnt" id="sc-Plan to Watch">0</span>
    </button>
  </div>

  <div class="sb-section">
    <div class="sb-label">Rating</div>
    <button class="sb-btn on" data-sb-rating="0" onclick="clickRating(this,0)"><span>All Ratings</span></button>
    <button class="sb-btn" data-sb-rating="5" onclick="clickRating(this,5)"><span style="color:var(--gold);">★★★★★</span><span class="sb-cnt" id="rc-5">0</span></button>
    <button class="sb-btn" data-sb-rating="4" onclick="clickRating(this,4)"><span style="color:var(--gold);">★★★★☆</span><span class="sb-cnt" id="rc-4">0</span></button>
    <button class="sb-btn" data-sb-rating="3" onclick="clickRating(this,3)"><span style="color:var(--gold);">★★★☆☆</span><span class="sb-cnt" id="rc-3">0</span></button>
    <button class="sb-btn" data-sb-rating="2" onclick="clickRating(this,2)"><span style="color:var(--gold);">★★☆☆☆</span><span class="sb-cnt" id="rc-2">0</span></button>
    <button class="sb-btn" data-sb-rating="1" onclick="clickRating(this,1)"><span style="color:var(--gold);">★☆☆☆☆</span><span class="sb-cnt" id="rc-1">0</span></button>
  </div>

  <div class="sb-section">
    <div class="sb-label">Genre</div>
    <div class="genre-grid" id="genrePills"></div>
  </div>

</aside>

<!-- ═══════════════ MAIN ═══════════════ -->
<main class="main" id="mainArea">

  <!-- HOME SECTION -->
  <div class="section active" id="secHome">

    <div class="bento-grid">
      <div class="bento bento-big">
        <div class="label" style="margin-bottom:8px;">Total Anime</div>
        <div class="bento-val" id="statTotal">—</div>
        <div class="bento-icon">ア</div>
      </div>
      <div class="bento">
        <div class="label" style="margin-bottom:8px;">Episodes</div>
        <div class="bento-val" id="statEps">—</div>
        <div class="bento-icon" style="font-size:3rem;">▶</div>
      </div>
      <div class="bento">
        <div class="label" style="margin-bottom:8px;">Avg Rating</div>
        <div class="bento-val" id="statAvg">—</div>
        <div class="bento-icon" style="font-size:3rem;">★</div>
      </div>
    </div>

    <div class="sec-head">
      <div class="sec-head-title">Currently Watching</div>
      <button class="view-all" onclick="clickStatus(document.querySelector('[data-sb-status=Watching]'),'Watching')">
        View all
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
    <div class="cw-grid" id="cwGrid"></div>

    <div class="sec-head" style="margin-top:32px;">
      <div class="sec-head-title">Top Rated</div>
      <button class="view-all" onclick="showCollByRating()">
        View all
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
    <div class="hscroll" id="topRated"></div>

  </div>

  <!-- COLLECTION SECTION -->
  <div class="section" id="secColl">
    <div class="coll-toolbar">
      <div class="coll-toolbar-left">
        <span id="collTitle" style="font-family:var(--head);font-size:13px;font-weight:900;letter-spacing:2px;text-transform:uppercase;"></span>
        <span class="count-badge" id="countBadge">0</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <button class="sort-btn on" data-sb-sort="title" onclick="clickSort(this,'title')">A–Z</button>
        <button class="sort-btn" data-sb-sort="rating" onclick="clickSort(this,'rating')">Rating</button>
        <button class="sort-btn" data-sb-sort="episodes" onclick="clickSort(this,'episodes')">Episodes</button>
        <button class="sort-btn" data-sb-sort="added_on" onclick="clickSort(this,'added_on')">Date</button>
        <div class="view-toggle">
          <button class="vbtn on" id="vgrid" onclick="clickView('grid')" title="Grid">⊞</button>
          <button class="vbtn" id="vlist" onclick="clickView('list')" title="List">☰</button>
        </div>
      </div>
    </div>
    <div class="genre-bar" id="genreBar"></div>
    <div id="collContent"></div>
  </div>

</main>
</div><!-- .app -->

<!-- ═══════════════ DETAIL DRAWER ═══════════════ -->
<div class="drawer-bd" id="drawerBd" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-hero">
    <div class="drawer-hero-img">
      <div class="img-ph" id="drawerPh"><div class="spinner"></div></div>
      <img id="drawerImg" src="" alt="" style="display:none;"/>
      <div class="hero-grad"></div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
    <div class="drawer-info">
      <div class="drawer-title" id="drawerTitle"></div>
      <div class="drawer-genre" id="drawerGenre"></div>
      <div class="drawer-stars" id="drawerStars"></div>
    </div>
  </div>
  <div class="drawer-body">
    <div class="drow"><span class="dkey">STATUS</span><span class="dval" id="drawerStatus"></span></div>
    <div class="drow"><span class="dkey">EPISODES</span><span class="dval" id="drawerEps"></span></div>
    <div class="drow"><span class="dkey">ADDED</span><span class="dval" id="drawerAdded"></span></div>
    <div class="drawer-notes-wrap">
      <div class="label" style="margin-bottom:8px;">Notes</div>
      <div class="drawer-notes" id="drawerNotes"></div>
    </div>
  </div>
  <div class="drawer-actions">
    <button class="btn-edit" onclick="editFromDrawer()">✎ Edit</button>
    <button class="btn-remove" onclick="deleteFromDrawer()">⌫ Remove</button>
  </div>
</div>

<!-- ═══════════════ MODAL ═══════════════ -->
<div class="modal-bd" id="modalBd">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">New Entry</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="fId"/>
      <div class="field">
        <label>Title</label>
        <input id="fTitle" class="finput" type="text" placeholder="Anime title…" autocomplete="off"/>
      </div>

      <div class="field">
        <label>Poster Image (jpg/png)</label>
        <div class="file-upload-wrapper">
          <label for="fImage" class="file-upload-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            Choose Image...
          </label>
          <span id="fImageName" class="file-name">No file chosen</span>
          <input type="file" id="fImage" accept=".jpg, .jpeg, .png" style="display:none;" onchange="handleFileSelect(this)">
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>Genre</label>
          <select id="fGenre" class="finput"></select>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="fStatus" class="finput">
            <option>Completed</option><option>Watching</option>
            <option>On Hold</option><option>Dropped</option>
            <option>Plan to Watch</option>
          </select>
        </div>
      </div>
      
      <div class="field-row modal-row">
        <div class="field rating-group">
          <label>Your Rating</label>
          <div class="rating-stars" id="starRow">
            <span class="star on" data-v="1" onclick="clickStar(1)">★</span>
            <span class="star on" data-v="2" onclick="clickStar(2)">★</span>
            <span class="star on" data-v="3" onclick="clickStar(3)">★</span>
            <span class="star on" data-v="4" onclick="clickStar(4)">★</span>
            <span class="star on" data-v="5" onclick="clickStar(5)">★</span>
          </div>
        </div>
        <div class="field">
          <label>Episodes</label>
          <input id="fEps" class="finput" type="number" min="0" placeholder="0"/>
        </div>
      </div>

      <div class="field">
        <label>Watch Time (min/ep)</label>
        <input id="fMins" class="finput" type="number" min="0" placeholder="24"/>
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="fNotes" class="finput" rows="3" style="resize:vertical;" placeholder="Your thoughts…"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEntry()">Save Entry</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

/* ════════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════════ */
async function boot() {
  await IDB.open();

  // Seed if empty
  let rows = await IDB.all();
  if (rows.length === 0) {
    const today = todayStr();
    const seen  = new Set();
    for (const [title, genre, rating, status, episodes, mins] of SEED) {
      if (seen.has(title)) continue;
      seen.add(title);
      await IDB.put({ title, genre, rating, status, episodes, mins: mins || 24, notes: '', added_on: today });
    }
    rows = await IDB.all();
  }

  DB_DATA = rows;

  buildGenrePills();
  buildGenreBar();
  buildGenreSelect();
  refreshCounts();
  renderHome();

  // Responsive menu button visibility
  checkMobile();
  window.addEventListener('resize', checkMobile);
}

/* ════════════════════════════════════════════════════
   FILTERED DATA
════════════════════════════════════════════════════ */
function getFiltered() {
  let d = [...DB_DATA];

  if (F.search) {
    const q = F.search.toLowerCase();
    d = d.filter(a => a.title.toLowerCase().includes(q) || a.genre.toLowerCase().includes(q));
  }
  if (F.status !== 'All') d = d.filter(a => a.status === F.status);
  if (F.genre  !== 'All') d = d.filter(a => a.genre  === F.genre);
  if (F.rating > 0)       d = d.filter(a => a.rating === F.rating);

  d.sort((a, b) => {
    let va = a[F.sort], vb = b[F.sort];
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (va === vb) return a.title.toLowerCase() < b.title.toLowerCase() ? -1 : 1;
    return F.asc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
  });

  return d;
}

════════════════════════════════════════════════════ */
async function renderHome() {
  IMG.revokeAll();
  // Stats
  const total     = DB_DATA.length;
  const totalEps  = DB_DATA.reduce((s, a) => s + (a.episodes || 0), 0);
  const rated     = DB_DATA.filter(a => a.rating > 0);
  const avgRating = rated.length ? (rated.reduce((s, a) => s + a.rating, 0) / rated.length).toFixed(1) : '—';

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statEps').textContent   = totalEps.toLocaleString();
  document.getElementById('statAvg').textContent   = avgRating;

  // Currently Watching
  const watching = DB_DATA.filter(a => a.status === 'Watching').slice(0, 4);
  const cwEl     = document.getElementById('cwGrid');
  if (watching.length === 0) {
    cwEl.innerHTML = `<div class="empty" style="grid-column:1/-1;padding:30px 0;"><div class="empty-icon">📺</div><div class="empty-text">No anime currently watching</div></div>`;
  } else {
    const cards = await Promise.all(watching.map(a => buildCWCard(a)));
    cwEl.innerHTML = cards.join('');
  }

  // Top Rated horizontal scroll
  const top = [...DB_DATA].sort((a, b) => b.rating - a.rating || a.title.localeCompare(b.title)).slice(0, 20);
  const scroll = document.getElementById('topRated');
  const pcards  = await Promise.all(top.map(a => buildPosterCard(a)));
  scroll.innerHTML = pcards.join('');
}

async function renderCollection() {
  IMG.revokeAll();
  const data = getFiltered();
  document.getElementById('countBadge').textContent = `${data.length} entries`;

  const el = document.getElementById('collContent');
  if (data.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">⛩</div><div class="empty-text">No entries found</div></div>`;

  if (F.view === 'grid') {
    const cards = await Promise.all(data.map(a => buildGridCard(a)));
    el.innerHTML = `<div class="cards-grid">${cards.join('')}</div>`;
  } else {
    const rows = await Promise.all(data.map(a => buildListRow(a)));

  F.sort = 'rating'; F.asc = false;

/* ════════════════════════════════════════════════════
   SIDEBAR INTERACTIONS
════════════════════════════════════════════════════ */
function clickStatus(btn, val) {
  F.status = val;
  highlightSbStatus(val);
  if (val === 'All' && !F.search) { showHome(); }
  else { showColl(val === 'All' ? 'All Entries' : val); }
}

function clickRating(btn, val) {
  F.rating = val;
  document.querySelectorAll('[data-sb-rating]').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  if (document.getElementById('secColl').classList.contains('active')) renderCollection();
}

function clickSort(btn, col) {
  F.sort = col === F.sort && !F.asc ? 'title' : col;
  F.asc  = (col === F.sort) ? !F.asc : col === 'title';
  if (col !== F.sort) { F.sort = col; F.asc = (col === 'title'); }
  // Simpler: just toggle
  if (F.sort === col) F.asc = !F.asc; else { F.sort = col; F.asc = true; }
  highlightSort(col);
  renderCollection();
}

function clickView(v) {
  F.view = v;
  document.getElementById('vgrid').classList.toggle('on', v === 'grid');
  document.getElementById('vlist').classList.toggle('on', v === 'list');
  renderCollection();
}

function clickGenre(val) {
  F.genre = val;
  document.querySelectorAll('[data-genre-pill]').forEach(b => b.classList.toggle('on', b.dataset.genrePill === val));
  document.querySelectorAll('[data-genre-bar]').forEach(b => b.classList.toggle('on', b.dataset.genreBar === val));
  if (document.getElementById('secColl').classList.contains('active')) renderCollection();
}

function highlightSbStatus(val) {
  document.querySelectorAll('[data-sb-status]').forEach(b => b.classList.toggle('on', b.dataset.sbStatus === val));
}

function highlightSort(col) {
  document.querySelectorAll('[data-sb-sort]').forEach(b => b.classList.toggle('on', b.dataset.sbSort === col));
}

function handleSearch(val) {
  F.search = val.trim();
  if (F.search) showColl('Search Results');
  else showHome();
}

════════════════════════════════════════════════════ */
function refreshCounts() {
  const statuses = ['All', 'Completed', 'Watching', 'On Hold', 'Dropped', 'Plan to Watch'];
  statuses.forEach(s => {
    const el = document.getElementById(`sc-${s}`);
    if (el) el.textContent = s === 'All' ? DB_DATA.length : DB_DATA.filter(a => a.status === s).length;
  });
  for (let r = 1; r <= 5; r++) {
    const el = document.getElementById(`rc-${r}`);
    if (el) el.textContent = DB_DATA.filter(a => a.rating === r).length;
  }
}

function clearImageSelection() {

  if (fileInput) fileInput.value = "";

    fileNameDisplay.textContent = "No file chosen";

  }
}

document.getElementById('modalBd').addEventListener('click', e => {

});

function clickStar(n) { setStars(n); }

function setStars(n) {
  MODAL_STAR = n;
  document.querySelectorAll('.star').forEach(b => b.classList.toggle('on', parseInt(b.dataset.v) <= n));
}

function handleFileSelect(input) {
  const nameEl = document.getElementById('fImageName');
  if (input.files && input.files[0]) {
    nameEl.textContent = input.files[0].name;
    nameEl.style.color = "var(--color-accent-soft, #fca5a5)";
  } else {
    nameEl.textContent = "No file chosen";
    nameEl.style.color = "rgba(255,255,255,0.5)";
  }
}

async function saveEntry() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { toast('Title cannot be empty', true); return; }

  const id  = document.getElementById('fId').value;
  const eps = parseInt(document.getElementById('fEps').value) || 0;
  const mins = parseInt(document.getElementById('fMins').value) || 24;
  const fileInput = document.getElementById('fImage');

  const entry = {
    title,
    genre:    document.getElementById('fGenre').value,
    status:   document.getElementById('fStatus').value,
    rating:   MODAL_STAR,
    episodes: eps,
    mins,
    notes:    document.getElementById('fNotes').value.trim(),
    added_on: todayStr(),
  };
  if (id) entry.id = parseInt(id);

  try {
    // Note: Temporary URL approach as requested. 
    // In a full production app with IndexedDB image storage, we would 
    // save the blob to IDB here. For now, we follow the requested prompt logic.
    if (fileInput.files && fileInput.files[0]) {
      const imageUrl = URL.createObjectURL(fileInput.files[0]);
      console.log("Saving entry with image:", title, imageUrl);
      // If the app uses a centralized image handler, we could register it here.
    }

    await IDB.put(entry);
    DB_DATA = await IDB.all();
    refreshCounts();
    closeModal();
    if (document.getElementById('secColl').classList.contains('active')) renderCollection();
    else renderHome();
    toast(id ? `"${title}" updated` : `"${title}" added to your archive`);
  } catch (e) {
    toast('A title with that name already exists', true);
  }
}

async function deleteEntry(id) {
  const a = await IDB.get(id);
  if (!a) return;
  if (!confirm(`Remove "${a.title}" from your archive?`)) return;
  await IDB.del(id);
  DB_DATA = await IDB.all();
  refreshCounts();
  if (document.getElementById('secColl').classList.contains('active')) renderCollection();
  else renderHome();
  toast(`"${a.title}" removed`);
}

/* ════════════════════════════════════════════════════
   UTILITIES
════════════════════════════════════════════════════ */
function stars(n) {
  return '★'.repeat(Math.max(0, n)) + '☆'.repeat(Math.max(0, 5 - n));
}

function statusColor(s) {
  return { Completed:'var(--teal)', Watching:'var(--gold)', 'On Hold':'#9a9ab8', Dropped:'var(--acc)', 'Plan to Watch':'var(--purple)' }[s] || 'var(--dim)';
}

// Safe HTML escape
function x(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

let _toastTimer;
function toast(msg, err = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (err ? ' err' : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

/* ════════════════════════════════════════════════════
   KEYBOARD SHORTCUTS
════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('modalBd').classList.contains('open')) closeModal();
    else if (document.getElementById('drawer').classList.contains('open')) closeDrawer();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

/* ─── START ───────────────────────────────── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('Service Worker: Registered'))
      .catch(err => console.error('Service Worker: Error', err));
  });
}

window.addEventListener('online',  () => toast('Back Online'));
window.addEventListener('offline', () => toast('Working Offline', true));

boot();
</script>
